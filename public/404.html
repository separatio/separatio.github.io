<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Single-Page Apps for GitHub Pages</title>
    <script>
      // Single-page apps for GitHub Pages — rafgraph/spa-github-pages
      // pathSegmentsToKeep = 0 (root user/org Pages site)
      var pathSegmentsToKeep = 0

      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
