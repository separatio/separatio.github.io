<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <title>Alex Radulescu - QA Engineer</title>
    <script>
      // Single-page apps for GitHub Pages — rafgraph/spa-github-pages
      // Decode the path from the query string set by 404.html
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          )
        }
      })(window.location)
    </script>
  </head>
  <body id="root">
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
